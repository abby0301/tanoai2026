<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>パスコード入力</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>4桁の数字を入力してください</h2>
        <h3>4桁の筋は私と初めてLINEで話した時の日付です。</h3>
        <h4>例）4月1日→0401</h4>
        <input type="password" id="code" maxlength="4" placeholder="月月日日">
        <button onclick="checkCode()">送信</button>
        <p id="error"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
